<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2Cエキスパート検定3級 練習問題クイズ</title>
<style>
/* ===== テーマ変数 ===== */
:root{
  --c-bg:#f4f6f9;
  --c-surface:#ffffff;
  --c-ink:#1d2433;
  --c-sub:#5b6678;
  --c-line:#e3e8f0;
  --c-primary:#2f6df6;
  --c-primary-d:#1f54c9;
  --c-correct:#1aa179;
  --c-correct-bg:#e6f7f1;
  --c-wrong:#e0455e;
  --c-wrong-bg:#fdecef;
  --c-hook:#8a5a00;
  --c-hook-bg:#fff6e0;
  --radius:14px;
  --shadow:0 2px 10px rgba(29,36,51,.06);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:var(--c-bg);
  color:var(--c-ink);
  line-height:1.7;
  -webkit-text-size-adjust:100%;
}

/* ===== レイアウト ===== */
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 80px;}
.header{text-align:center;padding:14px 0 8px;}
.header__title{font-size:1.15rem;font-weight:700;margin:0;}
.header__sub{font-size:.8rem;color:var(--c-sub);margin:4px 0 0;}

/* モード切替タブ */
.tabs{display:flex;gap:6px;background:var(--c-surface);padding:6px;border-radius:var(--radius);box-shadow:var(--shadow);margin:14px 0;}
.tabs__btn{flex:1;border:0;background:transparent;color:var(--c-sub);font-size:.85rem;font-weight:600;padding:10px 4px;border-radius:10px;cursor:pointer;transition:.15s;}
.tabs__btn--active{background:var(--c-primary);color:#fff;}

/* コントロール（テストモード用） */
.controls{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;background:var(--c-surface);padding:12px;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;font-size:.85rem;}
.controls label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--c-sub);}
.controls input{width:16px;height:16px;accent-color:var(--c-primary);}

/* 進捗バー */
.progress{display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:.82rem;color:var(--c-sub);}
.progress__bar{flex:1;height:8px;background:var(--c-line);border-radius:99px;overflow:hidden;}
.progress__fill{height:100%;width:0;background:var(--c-primary);transition:width .25s;}

/* ===== カード ===== */
.card{background:var(--c-surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 18px;margin-bottom:14px;}
.card__meta{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
.tag{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:99px;background:#eef2fb;color:var(--c-primary-d);}
.tag--type{background:#f0ecff;color:#6b3fd1;}
.card__q{font-size:1.02rem;font-weight:700;margin:0 0 14px;}

/* 選択肢 */
.opts{display:flex;flex-direction:column;gap:9px;}
.opt{display:flex;gap:10px;align-items:flex-start;text-align:left;width:100%;border:1.5px solid var(--c-line);background:var(--c-surface);border-radius:11px;padding:12px 13px;font-size:.92rem;color:var(--c-ink);cursor:pointer;transition:.12s;font-family:inherit;line-height:1.6;}
.opt:hover:not(:disabled){border-color:var(--c-primary);background:#f7f9ff;}
.opt:disabled{cursor:default;}
.opt__num{flex:none;width:22px;height:22px;border-radius:50%;background:var(--c-line);color:var(--c-sub);font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.opt--correct{border-color:var(--c-correct);background:var(--c-correct-bg);}
.opt--correct .opt__num{background:var(--c-correct);color:#fff;}
.opt--wrong{border-color:var(--c-wrong);background:var(--c-wrong-bg);}
.opt--wrong .opt__num{background:var(--c-wrong);color:#fff;}

/* 解説 */
.explain{margin-top:14px;padding:13px 14px;border-radius:11px;background:#f7f9fc;border:1px solid var(--c-line);font-size:.88rem;display:none;}
.explain--show{display:block;animation:fade .2s;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;}}
.explain__line{margin:0 0 8px;}
.explain__line:last-child{margin-bottom:0;}
.explain__label{font-weight:700;}
.explain__hook{background:var(--c-hook-bg);color:var(--c-hook);padding:8px 11px;border-radius:8px;font-weight:600;}
.verdict{font-weight:700;margin:0 0 8px;}
.verdict--ok{color:var(--c-correct);}
.verdict--ng{color:var(--c-wrong);}

/* ボタン */
.btn{display:block;width:100%;border:0;border-radius:11px;padding:14px;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:.12s;}
.btn--primary{background:var(--c-primary);color:#fff;}
.btn--primary:hover{background:var(--c-primary-d);}
.btn--ghost{background:var(--c-surface);color:var(--c-primary);border:1.5px solid var(--c-line);}
.btn--sm{padding:9px;font-size:.85rem;}
.nav{display:flex;gap:10px;margin-top:6px;}

/* 結果画面 */
.result{text-align:center;padding:30px 18px;}
.result__score{font-size:2.6rem;font-weight:800;margin:8px 0;}
.result__score small{font-size:1rem;color:var(--c-sub);font-weight:600;}
.result__msg{font-size:.95rem;color:var(--c-sub);margin-bottom:6px;}

/* 答え表示の行スタイル（テスト結果の復習リストで使用） */
.sheet__row{display:flex;gap:12px;padding:13px 4px;border-bottom:1px solid var(--c-line);}
.sheet__row:last-child{border-bottom:0;}
.sheet__no{flex:none;width:30px;font-weight:800;color:var(--c-primary);}
.sheet__body{flex:1;}
.sheet__theme{font-size:.72rem;color:var(--c-sub);}
.sheet__ans{font-weight:700;margin:2px 0;}
.sheet__ans b{color:var(--c-correct);}
.sheet__hook{font-size:.82rem;color:var(--c-hook);background:var(--c-hook-bg);display:inline-block;padding:2px 8px;border-radius:7px;margin-top:3px;}
.note{font-size:.78rem;color:var(--c-sub);background:#eef2fb;border-radius:10px;padding:11px 13px;margin-bottom:14px;}

/* 暗記カードの答え表示ボタン領域 */
.reveal{margin-top:14px;}

@media print{
  body{background:#fff;}
  .tabs,.controls,.progress,.btn,.nav{display:none!important;}
  .card,.note{box-shadow:none;border:1px solid #ccc;}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="header">
    <h1 class="header__title">D2Cエキスパート検定3級 練習問題</h1>
    <p class="header__sub">全50問／暗記用クイズ &middot; 本番:60分100問・70点で合格</p>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tabs__btn tabs__btn--active" data-mode="flash">🃏 暗記カード</button>
    <button class="tabs__btn" data-mode="test">✏️ テスト</button>
  </nav>

  <div id="app"></div>
</div>

<script>
/* ===== 問題データ ===== */
/* correct は0始まりのインデックス（0=①, 1=②, 2=③, 3=④） */
const QUESTIONS = [
  {id:1, theme:"マーケティング定義", type:"適切を選択", q:"日本マーケティング協会が定めたマーケティングの定義について正しいものを一つ選べ",
   options:[
     "（マーケティングとは）顧客や社会と共に価値を創造し、その価値を広く浸透させることによって、ステークホルダーとの関係性を醸成し、より豊かで持続可能な社会を実現するための構想でありプロセスである。",

   hook:"日本MA＝価値共創・ステークホルダー・持続可能な社会"},

  {id:2, theme:"マーケティング定義", type:"適切を選択", q:"アメリカマーケティング協会が定めたマーケティングの定義について正しいものを一つ選べ",
   options:[

     "マーケティングとは、顧客、依頼人、パートナー、社会全体にとって価値のある提供物を創造・伝達・配達・交換するための活動であり、一連の制度、そしてプロセスである。",
     "マーケティングとは、個人や組織の目標を満足させる交換を創造するために、アイディア、商品、サービスの概念化、価格設定、販売促進、流通を計画し、実行するプロセスである。",
     "（マーケティングとは）顧客や社会と共に価値を創造し、その価値を広く浸透させることによって、ステークホルダーとの関係性を醸成し、より豊かで持続可能な社会を実現するための構想でありプロセスである。"],
   correct:1,
   explanation:"アメリカマーケティング協会の定義（2007年制定）は②。なお③は1985年制定の定義で、4P（Product、Price、Place、Promotion）の考え方がストレートに出ている。",
   hook:"AMA2007＝創造・伝達・配達・交換／顧客・依頼人・パートナー・社会"},

  {id:3, theme:"ダイレクトマーケティング定義", type:"適切を選択", q:"日本ダイレクトマーケティング学会が定めたダイレクトマーケティングの定義について正しいものを一つ選べ",
   options:[
     "ダイレクトマーケティングとは自組織が個々に識別した顧客に対し、その顧客データを活用して設計した価値提供プロセスに基づき、直接顧客に働きかけ、組織の目的を達成する活動である。",

  {id:4, theme:"4P", type:"不適切を選択", q:"マーケティングの4Pについて誤っているものを一つ選べ",

  {id:7, theme:"D2C概論", type:"適切を選択", q:"D2Cと他の◯2◯の違いに関する下記の説明の中で正しいものを一つ選べ",

  {id:8, theme:"D2C定義", type:"適切を選択", q:"D2Cの定義に関する下記の説明の中で正しいものを一つ選べ。",

const MARK = ["①","②","③","④"];
const app = document.getElementById("app");

/* ===== 共通ユーティリティ ===== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ===== モード切替 ===== */
let currentMode = "flash";
document.getElementById("tabs").addEventListener("click", e=>{
  const btn = e.target.closest(".tabs__btn");
  if(!btn) return;
  currentMode = btn.dataset.mode;
  document.querySelectorAll(".tabs__btn").forEach(b=>b.classList.toggle("tabs__btn--active", b===btn));
  render();
});

function render(){
  if(currentMode==="test") renderTest();
  else renderFlash();
}

/* ===== 暗記カードモード ===== */
let flashIdx = 0;
let flashRevealed = false;
function renderFlash(){
  const q = QUESTIONS[flashIdx];
  const revealed = flashRevealed;
  const opts = q.options.map((t,i)=>{
    const isC = i===q.correct;
    const cls = revealed && isC ? "opt opt--correct" : "opt";
    return `<div class="${cls}"><span class="opt__num">${MARK[i]}</span><span>${t}</span></div>`;
  }).join("");

  app.innerHTML = `
    <div class="progress">
      <span>${flashIdx+1} / ${QUESTIONS.length}</span>
      <div class="progress__bar"><div class="progress__fill" style="width:${(flashIdx+1)/QUESTIONS.length*100}%"></div></div>
    </div>
    <div class="card">
      <div class="card__meta"><span class="tag">問${q.id}・${q.theme}</span><span class="tag tag--type">${q.type}</span></div>
      <p class="card__q">${q.q}</p>
      <div class="opts">${opts}</div>
      <div class="reveal">
        ${revealed ? `
          <div class="explain explain--show">
            <p class="verdict verdict--ok">正解：${MARK[q.correct]}</p>
            <p class="explain__line"><span class="explain__label">解説：</span>${q.explanation}</p>
            <p class="explain__line explain__hook">💡 ${q.hook}</p>
          </div>` : `<button class="btn btn--primary" id="revealBtn">答えを見る</button>`}
      </div>
    </div>
    <div class="nav">
      <button class="btn btn--ghost btn--sm" id="prevBtn">← 前へ</button>
      <button class="btn btn--ghost btn--sm" id="nextBtn">次へ →</button>
    </div>`;

  const rb = document.getElementById("revealBtn");
  if(rb) rb.onclick = ()=>{ flashRevealed = true; renderFlash(); };
  document.getElementById("prevBtn").onclick = ()=>{ flashIdx=(flashIdx-1+QUESTIONS.length)%QUESTIONS.length; flashRevealed=false; renderFlash(); };
  document.getElementById("nextBtn").onclick = ()=>{ flashIdx=(flashIdx+1)%QUESTIONS.length; flashRevealed=false; renderFlash(); };
}

/* ===== テストモード ===== */
let testState = null;

function renderTest(){
  if(!testState) return renderTestStart();
  if(testState.idx >= testState.order.length) return renderTestResult();
  renderTestQuestion();
}

function renderTestStart(){
  app.innerHTML = `
    <div class="controls">
      <label><input type="checkbox" id="shufQ" checked> 問題をシャッフル</label>
      <label><input type="checkbox" id="shufO" checked> 選択肢をシャッフル</label>
    </div>
    <div class="card result">
      <p class="result__msg">全50問を自己採点します。<br>選択肢シャッフルをONにすると、番号暗記に頼らず本番に強くなります。</p>
      <button class="btn btn--primary" id="startBtn">テスト開始</button>
    </div>`;
  document.getElementById("startBtn").onclick = ()=>{
    const shufQ = document.getElementById("shufQ").checked;
    const shufO = document.getElementById("shufO").checked;
    const order = shufQ ? shuffle(QUESTIONS.map((_,i)=>i)) : QUESTIONS.map((_,i)=>i);
    const optOrders = QUESTIONS.map(q=> shufO ? shuffle(q.options.map((_,i)=>i)) : q.options.map((_,i)=>i));
    testState = {order, optOrders, answers:[], idx:0, shufQ, shufO};
    renderTest();
  };
}

function renderTestQuestion(){
  const qi = testState.order[testState.idx];
  const q = QUESTIONS[qi];
  const optOrder = testState.optOrders[qi];
  const answered = testState.answers[testState.idx];

  const opts = optOrder.map((origIdx, dispPos)=>{
    let cls = "opt";
    if(answered){
      if(origIdx===q.correct) cls="opt opt--correct";
      else if(origIdx===answered.chosenOrig) cls="opt opt--wrong";
    }
    return `<button class="${cls}" data-orig="${origIdx}" ${answered?"disabled":""}>
      <span class="opt__num">${MARK[dispPos]}</span><span>${q.options[origIdx]}</span></button>`;
  }).join("");

  let explainHtml = "";
  if(answered){
    const ok = answered.chosenOrig===q.correct;
    explainHtml = `
      <div class="explain explain--show">
        <p class="verdict ${ok?"verdict--ok":"verdict--ng"}">${ok?"⭕ 正解":"❌ 不正解"}（正答：${q.options[q.correct]}）</p>
        <p class="explain__line"><span class="explain__label">解説：</span>${q.explanation}</p>
        <p class="explain__line explain__hook">💡 ${q.hook}</p>
      </div>
      <button class="btn btn--primary" id="nextBtn" style="margin-top:14px;">${testState.idx===testState.order.length-1?"結果を見る":"次の問題 →"}</button>`;
  }

  const correctCount = testState.answers.filter(a=>a && a.ok).length;
  app.innerHTML = `
    <div class="progress">
      <span>${testState.idx+1} / ${testState.order.length}</span>
      <div class="progress__bar"><div class="progress__fill" style="width:${(testState.idx)/testState.order.length*100}%"></div></div>
      <span>正解 ${correctCount}</span>
    </div>
    <div class="card">
      <div class="card__meta"><span class="tag">問${q.id}・${q.theme}</span><span class="tag tag--type">${q.type}</span></div>
      <p class="card__q">${q.q}</p>
      <div class="opts">${opts}</div>
      ${explainHtml}
    </div>`;

  if(!answered){
    app.querySelectorAll(".opt").forEach(btn=>{
      btn.onclick = ()=>{
        const chosenOrig = parseInt(btn.dataset.orig,10);
        testState.answers[testState.idx] = {chosenOrig, ok: chosenOrig===q.correct};
        renderTest();
      };
    });
  } else {
    document.getElementById("nextBtn").onclick = ()=>{ testState.idx++; renderTest(); };
  }
}

function renderTestResult(){
  const total = testState.order.length;
  const correct = testState.answers.filter(a=>a && a.ok).length;
  const pct = Math.round(correct/total*100);
  const pass = pct>=70;
  const wrong = testState.order.map((qi,pos)=>({qi,a:testState.answers[pos]}))
    .filter(x=>x.a && !x.a.ok)
    .map(x=>{
      const q = QUESTIONS[x.qi];
      return `<div class="sheet__row">
        <div class="sheet__no">${q.id}</div>
        <div class="sheet__body">
          <div class="sheet__theme">${q.theme}</div>
          <div class="sheet__ans">正解 <b>${q.options[q.correct]}</b></div>
          <div class="sheet__hook">💡 ${q.hook}</div>
        </div></div>`;
    }).join("");

  app.innerHTML = `
    <div class="card result">
      <p class="result__msg">${pass?"🎉 合格ライン（70%）クリア！":"もう少し！復習しよう"}</p>
      <div class="result__score" style="color:${pass?"var(--c-correct)":"var(--c-wrong)"}">${pct}<small>％</small></div>
      <p class="result__msg">${total}問中 ${correct}問正解</p>
      <button class="btn btn--primary" id="retryBtn" style="margin-top:14px;">もう一度</button>
    </div>
    ${wrong ? `<div class="note">間違えた問題（復習）</div><div class="card">${wrong}</div>` : `<div class="note">全問正解！この調子で番号ではなく中身を維持しましょう。</div>`}`;
  document.getElementById("retryBtn").onclick = ()=>{ testState=null; renderTest(); };
}

/* 初期表示 */
render();
</script>
